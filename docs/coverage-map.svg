<svg viewBox="0 0 940 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>Italian Public Funding — Data Coverage Map</title>
<desc>The universe of Italian public tenders (about 272 billion euro, 267000 procedures a year) and business incentives (about 56 billion euro, 1000+ programs). It shows which data feeds are openly reachable and ingested by BandiRadar through ten source adapters — PVL open tenders, TED, ANAC OCDS, incentivi.gov.it, and six covered regions — versus the gated ones: the PNCP real-time API behind PDND accreditation, and tender documents spread across 449 contracting-authority portals behind login or JavaScript.</desc>

<rect x="0" y="0" width="940" height="580" fill="#ffffff"/>

<text x="470" y="33" text-anchor="middle" font-size="22" font-weight="700" fill="#15212b">Italian Public Funding — Data Coverage Map</text>
<text x="470" y="56" text-anchor="middle" font-size="13" fill="#5b6b78">What's published · what's openly reachable · what BandiRadar ingests</text>

