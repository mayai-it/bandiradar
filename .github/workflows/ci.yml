name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # Default extras only — anthropic/openai are optional and NOT installed,
      # so the suite runs with zero secrets (offline by design).
      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      # Tests + a coverage floor (src-only ~90%; the gap is live/network paths that
      # can't run offline). Fails the build if coverage regresses below 88%.
      - name: Tests + coverage gate (pytest)
        run: uv run pytest --cov=src/bandiradar --cov-fail-under=88

      # Security lint. Reviewed false positives carry an inline justification + a
      # `# nosec`; B101 (assert) is skipped in pyproject. A NEW unreviewed finding
      # (e.g. unparameterized SQL) fails the build.
      - name: Security scan (bandit)
        run: uv run bandit -r src/bandiradar -c pyproject.toml -q

      # Fail if a dependency has a known published vulnerability (PyPA advisory DB).
      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

  # Prove that `--sample` works from a pip-installed WHEEL (data is packaged),
  # not just from the source checkout. Builds the wheel, installs it into a CLEAN
  # venv, and runs an end-to-end offline match from OUTSIDE the repo.
  wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Build the wheel
        run: uv build --wheel

      - name: Install the wheel into a clean venv and run --sample
        env:
          BANDIRADAR_LLM_PROVIDER: none
        run: |
          set -euo pipefail
          python3 -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install dist/*.whl
          # Run from /tmp so there is NO source checkout / data dir on the path.
          cd /tmp
          /tmp/wheelenv/bin/bandiradar match --profile mayai --sample --db /tmp/ci.db
