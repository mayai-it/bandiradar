name: monitor

# Daily self-maintaining run: fetch every key-less source (+ toscana, so the
# self-healing crawl drift-check runs in production), watch each bundled profile,
# and publish RSS/JSON feeds + STATUS.md to the flat `monitor-data` branch.
#
# Zero secrets required (guardrail 1): keyless => recall mode, offline heuristic
# matcher, crawl drift only DETECTED. If the optional ANTHROPIC_API_KEY secret is
# present it is used for LLM scoring AND activates the crawl healer.

on:
  schedule:
    # 05:23 UTC daily — off-peak minute on purpose: GitHub often skips schedules
    # that fire on the hour (minute 0) under load congestion.
    - cron: "23 5 * * *"
  workflow_dispatch: {} # manual trigger

# Needed to force-push the generated state to the monitor-data branch.
permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    # The whole run should finish in ~5 min (one fetch + N skip-fetch matches);
    # 60 is a generous ceiling so a hung source can't pin a runner indefinitely.
    timeout-minutes: 60
    env:
      # Optional: present => LLM scoring + healer ON; absent => fully keyless.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # The monitor DB lives on the published branch (checked out at ./state).
      BANDIRADAR_DB: state/bandiradar.db
      # Spike guard: at most this many NEW LLM scorings (cache misses) per profile
      # run; the rest defer to later runs (the score cache amortizes them). Keyless
      # runs ignore it. Unset => unlimited.
      BANDIRADAR_LLM_BUDGET: "1500"
      # Optional HTTP relay for CI-blocked hosts (incentivi.gov.it drops datacenter
      # IPs at connect). The relay (a Cloudflare Worker with its own host allowlist)
      # is the operator's infrastructure; secrets absent => no rerouting, the gap
      # stays documented and everything else runs as today.
      BANDIRADAR_RELAY_URL: ${{ secrets.BANDIRADAR_RELAY_URL }}
      BANDIRADAR_RELAY_TOKEN: ${{ secrets.BANDIRADAR_RELAY_TOKEN }}
      BANDIRADAR_RELAY_HOSTS: www.incentivi.gov.it
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        # persist-credentials (default) leaves a token-authed `origin` so the
        # state worktree can force-push monitor-data with no extra setup.

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          set -euo pipefail
          # When the key is present we WILL use the LLM, so the anthropic SDK must be
          # installed — `uv sync` alone omits it (it is an optional extra). Without
          # this the run would silently fall back to the heuristic. (See the guard.)
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "Key present -> installing with --extra anthropic."
            uv sync --extra anthropic
          else
            uv sync
          fi

      - name: Configure run (mode, profiles)
        run: |
          set -euo pipefail
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "Key present -> LLM scoring + healer, balanced mode (pending guard)."
            echo "BANDIRADAR_LLM_PROVIDER=anthropic" >> "$GITHUB_ENV"
            echo "MODE=balanced" >> "$GITHUB_ENV"
          else
            echo "No key -> keyless, recall mode (offline heuristic, drift detect-only)."
            echo "MODE=recall" >> "$GITHUB_ENV"
          fi
          # Default: LLM inactive. The guard below UPGRADES this to --llm-active only
          # after proving the client is really buildable, so STATUS.md can never show
          # a fake "LLM ON".
          echo "LLM_FLAG=" >> "$GITHUB_ENV"
          PROFILES=$(ls src/bandiradar/data/profiles/*.yaml \
            | xargs -n1 basename | sed 's/\.yaml$//' | paste -sd, -)
          echo "PROFILES=$PROFILES" >> "$GITHUB_ENV"
          echo "RUN_STARTED=$(date -u +%FT%TZ)" >> "$GITHUB_ENV"
          echo "Profiles: $PROFILES"

      - name: Guard — LLM client must be REAL when a key is set (no fake "LLM ON")
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          set -euo pipefail
          # The key is set, so the LLM MUST be usable. If get_client() can't build a
          # client (e.g. SDK missing), FAIL the run now with the honest reason rather
          # than silently scoring with the heuristic under --mode balanced.
          status=$(uv run python -c \
            "from bandiradar.matching.llm import client_status; print(client_status())")
          echo "LLM client status: $status"
          if ! uv run python -c \
            "from bandiradar.matching.llm import get_client; import sys; sys.exit(0 if get_client() else 1)"; then
            echo "::error::ANTHROPIC_API_KEY is set but no LLM client could be built ($status)."
            exit 1
          fi
          echo "LLM client OK -> activating LLM scoring + healer."
          echo "LLM_FLAG=--llm-active" >> "$GITHUB_ENV"

      - name: Check out (or create) the monitor-data branch at ./state
        run: |
          set -euo pipefail
          git config user.name "bandiradar-monitor[bot]"
          git config user.email "bandiradar-monitor@users.noreply.github.com"
          git fetch origin monitor-data || true
          if git rev-parse --verify --quiet origin/monitor-data >/dev/null 2>&1; then
            echo "monitor-data exists -> checking it out into ./state"
            git worktree add state origin/monitor-data
            git -C state checkout -B monitor-data origin/monitor-data
          else
            echo "monitor-data missing -> creating an empty orphan branch in ./state"
            git worktree add -d state
            git -C state checkout --orphan monitor-data
            git -C state rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p state/feeds

      - name: Endpoint reachability probe (diagnose 403 / timeout from the runner)
        run: |
          set -uo pipefail
          # Best-effort, BEFORE the watches: show the HTTP status the GitHub runner
          # gets from the flaky endpoints, using OUR identifying User-Agent. A 403
          # here (with the honest UA) points to an IP block, not a UA block; a
          # timeout/000 points to a network reach problem — either way we learn it
          # in seconds instead of waiting out the watch retries.
          ua="bandiradar-monitor-probe (+https://github.com/mayai-it/bandiradar)"
          probe() {
            code=$(curl -sS -o /dev/null -m 15 -A "$ua" \
              -w "%{http_code}" "$2" 2>/dev/null || echo "000(curl-error)")
            echo "  probe $1: HTTP $code  ($2)"
          }
          echo "Endpoint reachability from this runner:"
          probe TED            "https://api.ted.europa.eu/v3/notices/search"
          probe incentivi      "https://www.incentivi.gov.it/solr/coredrupal/select"
          probe sicilia        "https://www.euroinfosicilia.it/wp-json/wp/v2/posts?categories=321&per_page=1"
          probe emilia_romagna "https://politicheterritoriali.regione.emilia-romagna.it/++api++/@search?portal_type=Bando&b_size=1"
          probe trentino       "https://dati.trentino.it/api/3/action/package_show?id=calendario-degli-avvisi-e-degli-inviti-a-partecipare-bandi-feasr"
          # When the optional relay is configured, ALSO probe incentivi through it
          # (curl -G --data-urlencode builds the ?u=<urlencoded> exactly like the
          # engine does) so BOTH outcomes — direct and relayed — are in the log.
          if [ -n "${BANDIRADAR_RELAY_URL:-}" ] && [ -n "${BANDIRADAR_RELAY_TOKEN:-}" ]; then
            code=$(curl -G -sS -o /dev/null -m 20 -A "$ua" \
              -H "X-Relay-Token: ${BANDIRADAR_RELAY_TOKEN}" \
              --data-urlencode "u=https://www.incentivi.gov.it/solr/coredrupal/select?q=*:*&rows=1&wt=json" \
              -w "%{http_code}" "$BANDIRADAR_RELAY_URL" 2>/dev/null || echo "000(curl-error)")
            echo "  probe incentivi (via relay): HTTP $code"
          else
            echo "  probe incentivi (via relay): relay not configured — skipped"
          fi

      - name: Watch every bundled profile (single fetch, rest reuse the DB)
        # Budget the long part HERE, not on the job: if scoring backlogs, this step
        # is cut at 45 min but doctor + STATUS + publish (below, if: always) still
        # get their ~15 min — so a slow run can never leave a stale STATUS published
        # next to fresh data. A truncated loop is surfaced honestly in STATUS.md
        # (profiles without a .stats.json sidecar are flagged "incomplete").
        timeout-minutes: 45
        run: |
          set -uo pipefail
          # FETCH ONCE per run: the FIRST profile does the live fetch of every
          # source; the rest pass --skip-fetch and match the data already in the DB
          # (the per-profile delta stays correct — it is computed from the store's
          # change-detection against each profile's own marker). This turns the old
          # 8x redundant fetch (30+ min) into one (~5 min).
          #
          # A single watch invocation writes BOTH the RSS file and pure-JSON stdout
          # (the "wrote RSS feed" line goes to stderr when --json is set). stderr is
          # tee'd to the Actions log for live progress AND saved to <name>.log.
          # --stats-out writes a {scored, deferred} sidecar ON COMPLETION (also the
          # monitor's per-profile completion marker). `|| true` so one source/profile
          # failure never aborts the loop — partial failure is surfaced in STATUS.md.
          IFS=',' read -ra names <<< "$PROFILES"
          first=1
          for name in "${names[@]}"; do
            echo "::group::watch $name"
            skip="--skip-fetch"
            if [ "$first" = "1" ]; then
              skip=""           # first profile performs the one live fetch
              first=0
              echo "(fetching all sources for this run)"
            else
              echo "(reusing the shared fetch via --skip-fetch)"
            fi
            uv run bandiradar watch --profile "$name" --mode "$MODE" $skip \
              --rss "state/feeds/$name.xml" --json \
              --stats-out "state/feeds/$name.stats.json" \
              > "state/feeds/$name.json" \
              2> >(tee "state/feeds/$name.log" >&2) || true
            echo "::endgroup::"
          done

      - name: Doctor probe (keyless live crawl-health -> drift signal)
        if: always() # run even if the watch step was cut by its timeout
        run: |
          set -uo pipefail
          # Best-effort: doctor exits non-zero when a source needs a key / is
          # unreachable; we only want its structured crawl_health, so never abort.
          uv run bandiradar doctor --json > state/doctor.json 2>/dev/null || true

      - name: Prune the DB (retention) before publishing
        if: always() # keep the published DB under GitHub's 100 MB blob limit
        run: |
          set -uo pipefail
          # Drop raw_docs of long-closed opportunities + old run-audit rows, then
          # VACUUM. NEVER touches the score cache, watch markers, or crawl recipes.
          # Best-effort: a prune hiccup must not block publishing the status.
          [ -f "$BANDIRADAR_DB" ] || { echo "no DB yet; skip prune"; exit 0; }
          uv run bandiradar prune --closed-before-days 90 --runs-before-days 30 \
            || echo "::warning::prune failed; publishing without it"

      - name: Generate STATUS.md (fail only when ALL sources failed)
        if: always() # always produce a truthful STATUS, even after a truncated loop
        run: |
          set -uo pipefail
          uv run python scripts/monitor_status.py \
            --db "$BANDIRADAR_DB" \
            --feeds state/feeds \
            --doctor state/doctor.json \
            --profiles "$PROFILES" \
            --out state/STATUS.md \
            --run-started "$RUN_STARTED" \
            $LLM_FLAG
          echo "MONITOR_RC=$?" >> "$GITHUB_ENV"
          echo "----- STATUS.md -----"
          cat state/STATUS.md

      - name: Publish to monitor-data (single flat commit, force-push)
        if: always()
        run: |
          set -euo pipefail
          [ -d state ] || { echo "no state worktree; nothing to publish"; exit 0; }
          cd state
          git add -A
          # Rewrite to a SINGLE root commit each run so the data branch never grows
          # a history that bloats the repo (it is generated state, not source).
          git checkout --orphan _publish
          git commit -m "monitor: ${RUN_STARTED:-run} [skip ci]" --quiet || {
            echo "nothing to commit"; exit 0;
          }
          git branch -M monitor-data
          git push -f origin monitor-data

      - name: Enforce verdict (fail the run only if every source failed)
        if: always()
        run: |
          if [ "${MONITOR_RC:-0}" != "0" ]; then
            echo "::error::All sources failed this run — see state/STATUS.md."
            exit 1
          fi
          echo "Run OK (or partial failure surfaced in STATUS.md)."
